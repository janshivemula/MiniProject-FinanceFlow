<div class="category-page">
  <div class="page-top">
    <div>
      <h2>Expense Categories</h2>
      <p>Manage expense categories in FinanceFlow</p>
    </div>

    <button class="btn add-btn" routerLink="/dashboard/expense-categories/add">
      <i class="bi bi-plus-circle"></i>
      Add Category
    </button>
  </div>

  <div class="category-card">
    <div *ngIf="errorMessage" class="alert alert-danger mb-3">
      {{ errorMessage }}
    </div>

    <div class="table-responsive">
      <table class="table category-table align-middle mb-0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Category Name</th>
            <th>Status</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>

        <tbody>
          <ng-container *ngIf="categories$ | async as categories">
            <tr *ngIf="categories.length === 0">
              <td colspan="4" class="text-center py-4">No categories found</td>
            </tr>

            <tr *ngFor="let category of categories">
              <td>{{ category.id }}</td>
              <td class="fw-semibold">{{ category.categoryName }}</td>
              <td>
                <span class="status-badge" [ngClass]="category.isActive ? 'active' : 'inactive'">
                  {{ getStatusText(category.isActive) }}
                </span>
              </td>
              <td class="text-center">
                <button
                  class="btn btn-sm action-btn edit-btn me-2"
                  [routerLink]="category.isActive ? ['/dashboard/expense-categories/edit', category.id] : null"
                  [disabled]="!category.isActive">
                  <i class="bi bi-pencil-square"></i>
                </button>

                <button
                  class="btn btn-sm action-btn delete-btn"
                  (click)="deleteCategory(category.id)"
                  [disabled]="!category.isActive">
                  <i class="bi bi-trash3"></i>
                </button>
              </td>
            </tr>
          </ng-container>
        </tbody>
      </table>
    </div>
  </div>
</div>
