<div class="login-page">
  <div class="login-wrapper container-fluid">
    <div class="row g-0 login-panel">

      <!-- LEFT BRAND SECTION -->
      <div class="col-lg-7 d-none d-lg-flex brand-section">
        <div class="brand-content">
          <div class="brand-logo">
            <div class="logo-bars">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <h1>Finance<span>Flow</span></h1>
            <p>Smart Expense Management System</p>
          </div>

          <div class="brand-illustration">
            <div class="wallet-card">
              <div class="wallet-main">
                <div class="wallet-pocket"></div>
                <div class="wallet-chip"></div>
                <div class="wallet-number">1234 5678 9012 3456</div>
              </div>

              <div class="paper-sheet">
                <div class="line w-75"></div>
                <div class="line w-50"></div>
                <div class="chart-row">
                  <div class="pie"></div>
                  <div class="bars">
                    <span></span>
                    <span></span>
                    <span></span>
                  </div>
                </div>
              </div>

              <div class="coin coin-1">$</div>
              <div class="coin coin-2">$</div>
              <div class="coin coin-3">$</div>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT LOGIN CARD -->
      <div class="col-lg-5 col-12 login-card-section">
        <div class="login-card">
          <div class="login-icon">
            <i class="bi bi-person"></i>
          </div>

          <h2>Welcome Back</h2>
          <p class="subtitle">Please sign in to continue</p>

          <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

            <!-- EMAIL -->
            <div class="mb-3">
              <div class="input-icon-group">
                <span class="input-icon">
                  <i class="bi bi-person"></i>
                </span>
                <input
                  type="text"
                  class="form-control custom-input"
                  placeholder="Email"
                  formControlName="email"
                />
              </div>
              <div class="text-danger small mt-1" *ngIf="f['email'].touched && f['email'].invalid">
                Email is required
              </div>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
              <div class="input-icon-group password-group">
                <span class="input-icon">
                  <i class="bi bi-lock"></i>
                </span>
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  class="form-control custom-input"
                  placeholder="Password"
                  formControlName="password"
                />
                <button
                  type="button"
                  class="eye-btn"
                  (click)="togglePassword()"
                >
                  <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                </button>
              </div>
              <div class="text-danger small mt-1" *ngIf="f['password'].touched && f['password'].invalid">
                Password is required
              </div>
            </div>

            <!-- REMEMBER + FORGOT -->
            <div class="d-flex justify-content-between align-items-center mb-3 options-row">
              <div class="form-check remember-check">
                <input class="form-check-input" type="checkbox" id="rememberMe" />
                <label class="form-check-label" for="rememberMe">
                  Remember me
                </label>
              </div>

              <a href="javascript:void(0)" class="forgot-link">Forgot password?</a>
            </div>

            <!-- ERROR -->
            <div *ngIf="errorMessage" class="alert alert-danger py-2 small">
              {{ errorMessage }}
            </div>

            <!-- LOGIN BUTTON -->
            <button type="submit" class="btn login-btn w-100" [disabled]="isSubmitting">
              {{ isSubmitting ? 'Logging in...' : 'Login' }}
            </button>
          </form>

          <div class="copyright">
            © 2024 FinanceFlow. All rights reserved.
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
